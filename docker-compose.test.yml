# ============================================================
# docker-compose.test.yml — Day 2 Phase B.L2 integration test 真 PG / Redis
#
# 与 docker-compose.yml（dev）严格隔离：
#   - PG 端口 5433（dev 5432）/ DB edu_test / user eduapp / 密码 testpassword
#   - Redis 端口 6380（dev 6379）
#   - tmpfs 跑 PG 数据目录加速 + 退出无残留
#   - 不挂载 migrations 卷（migrations 由 test/integration/setup.ts 应用层跑 +
#     占位符 __TENANT_SCHEMA__ 必须在应用层 sed，docker initdb-d 不支持）
#
# 启动 / 停止：
#   docker-compose -f docker-compose.test.yml up -d
#   docker-compose -f docker-compose.test.yml down
#
# 使用：
#   pnpm test:integration（package.json 已加 script）
#
# 来源：
#   - 用户 5/19 拍板「测试体系重建 v2.0」§3.L2
#   - Day 2 plan sprightly-inventing-star.md Phase B.L2
#
# 触发原因：今日 V41 schema drift 事故（50 tenant 缺 customers.primary_mobile_hash 列）
# 单测全 mock PG 永远抓不到「列不存在 / 类型不匹配 / NULL 处理」3 类 schema drift。
# ============================================================

services:
  postgres-test:
    image: postgres:14-alpine
    container_name: edu-postgres-test
    restart: "no"
    environment:
      POSTGRES_USER: eduapp
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: edu_test
      # 默认 utf8 + 时区 UTC（与生产 PG 14 一致）
      LANG: en_US.utf8
      TZ: UTC
    ports:
      - "5433:5432"
    # tmpfs：测试无需持久化 + 极速 IO（生产 PG 14 是 ext4 持久化）
    # 注意：tmpfs 模式下 container 退出数据全失，符合 test isolation 语义
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduapp -d edu_test"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis-test:
    image: redis:6-alpine
    container_name: edu-redis-test
    restart: "no"
    ports:
      - "6380:6379"
    # 不开 AOF / 不挂 volume — 测试结束无残留
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 3s
